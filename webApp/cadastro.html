<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuro+ | Cadastro</title>
    <!-- Chamada para o CSS compartilhado, evitando código repetido -->
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="left-panel">
        <!-- Ícone PNG unificado -->
        <img src="assets/images/logo.png" alt="Futuro+ Logo" class="logo-png-img">
        
        <div class="tabs">
            <a href="login.html" class="tab">login</a>
            <a href="cadastro.html" class="tab active">cadastro</a>
        </div>

        <div class="form-group">
            <input type="text" placeholder="nome">
        </div>
        <div class="form-group">
            <input type="email" placeholder="email">
        </div>
        <div class="form-group">
            <input type="password" placeholder="senha">
        </div>

        <button class="btn-login">Cadastrar</button>

        <div class="register-link">
            Já possui uma conta? <a href="login.html">Faça seu login!</a>
        </div>
    </div>

    <!-- Painel direito puxando a imagem de fundo em PNG -->
    <div class="right-panel">
        <img src="assets/images/background-blobs.png" alt="Grafismo de fundo" class="bg-png-image">
    </div>

    <script type="module" src="assets/js/cadastro.js"></script>
</body>
</html>
