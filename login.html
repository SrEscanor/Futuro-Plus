<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuro+ | Login</title>
    <!-- Chamada para o CSS externo separado -->
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="left-panel">
        <!-- Logo SVG mantido exatamente como o seu original -->
        <img src="assets/images/logo.png" alt="Futuro+ Logo" class="logo-png-img">

        <div class="tabs">
            <a href="login.html" class="tab active">login</a>
            <a href="cadastro.html" class="tab">cadastro</a>
        </div>

        <div class="form-group">
            <input id="email" type="email" placeholder="email">
        </div>
        
        <div class="form-group">
            <input id="senha" type="password" placeholder="senha">
        </div>

        <div class="forgot">
            <a href="#">esqueci minha senha</a>
        </div>

        <button class="btn-login">Login</button>

        <div class="register-link">
            É novo por aqui? <a href="cadastro.html">Crie sua conta!</a>
        </div>
    </div>

    <div class="right-panel">
    <!-- Remova as antigas divs dos blobs e coloque esta linha limpa -->
        <img src="assets/images/background-blobs.png" alt="Grafismo de fundo" class="bg-png-image">
    </div>

    <script type="module" src="assets/js/login.js"></script>
</body>
</html>
